# Cloud Build -> Cloud Run CD for the City Perfume export job (a JOB, not a service).
#
# Wire a Cloud Build trigger (one-time, mirrors the README add-a-client playbook):
#   repo:           Bidbrain/bidbrain-analytics
#   event:          push to ^main$
#   included files: client_cityperfume/job/**   (only redeploy when this unit changes)
#   config:         client_cityperfume/job/cloudbuild.yaml
#
# The trigger's service account needs: roles/run.admin, roles/artifactregistry.writer,
# and roles/iam.serviceAccountUser on _RUNTIME_SA.
# NOTE: do NOT run this from a laptop (gcloud builds submit --config fails on actAs) — for
# manual redeploys use job/deploy_job_cityperfume.ps1. The daily run is a Cloud Scheduler trigger.
substitutions:
  _REGION: australia-southeast1
  _REPO: bidbrain                                                          # Artifact Registry docker repo (shared)
  _JOB: cityperfume-export
  _RUNTIME_SA: cityperfume-dash-job@bidbrain-analytics.iam.gserviceaccount.com
  _BUCKET: bidbrain-analytics-cityperfume-dash
  _DATASET: client_cityperfume
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: client_cityperfume/job
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA", "."]
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA"]
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    # `run jobs deploy` (NOT `run deploy`) creates-or-updates the Cloud Run Job.
    args:
      - run
      - jobs
      - deploy
      - ${_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA
      - --region=${_REGION}
      - --service-account=${_RUNTIME_SA}
      - --memory=1Gi
options:
  logging: CLOUD_LOGGING_ONLY
