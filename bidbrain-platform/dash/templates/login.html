<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Bidbrain · Campaign Dashboards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e16; --panel:#101726; --border:rgba(255,255,255,.08);
    --text:#e8ebf2; --muted:#8a93a6; --accent:#3b82f6; --accent-2:#2563eb;
    --err:#f87171;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       color:var(--text);
       background:radial-gradient(1100px 620px at 50% -8%,#152033 0%,#0b1120 52%,#070a11 100%)}
  .card{width:100%;max-width:380px;padding:38px 34px;background:var(--panel);
        border:1px solid var(--border);border-radius:18px;
        box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .logo{display:block;height:30px;width:auto;margin:0 auto 22px}
  .logo svg{height:30px;width:auto}
  h1{font-size:19px;font-weight:700;margin:0 0 4px;text-align:center}
  p.sub{font-size:13px;color:var(--muted);margin:0 0 24px;text-align:center}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 7px;letter-spacing:.3px}
  input{width:100%;padding:13px 14px;font-size:15px;color:var(--text);background:#0b111d;
        border:1px solid #20293b;border-radius:11px;outline:none;font-family:inherit}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.22)}
  button{width:100%;margin-top:16px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;
         background:var(--accent);color:#fff;border:none;border-radius:11px;letter-spacing:.2px;
         transition:background .15s}
  button:hover{background:var(--accent-2)}
  .err{margin-top:14px;font-size:13px;color:var(--err);min-height:16px;text-align:center}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px;color:#5b6478;font-size:12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;
        font-size:14px;font-weight:600;color:#1f2937;background:#fff;border:1px solid #dfe3ea;
        border-radius:11px;text-decoration:none;transition:background .15s}
  .gbtn:hover{background:#eef1f6}
  .gbtn svg{width:18px;height:18px;flex:none}
  .foot{margin-top:20px;font-size:11.5px;color:#5b6478;text-align:center;line-height:1.5}
</style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <div class="logo">{{ logo_svg | safe }}</div>
    <h1>Campaign Dashboards</h1>
    <p class="sub">Enter your agency or dashboard password.</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" name="password" placeholder="••••••••" autofocus
           autocomplete="current-password">
    <input type="hidden" name="next" value="{{ next_url or '' }}">
    <button type="submit">Continue</button>
    <div class="err">{{ error or "" }}</div>
    {% if google_enabled %}
    <div class="divider"><span>or</span></div>
    <a class="gbtn" href="/auth/google/login">
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>
    {% endif %}
    <div class="foot">An agency password opens every dashboard in that agency.<br>A single dashboard password opens just that dashboard.</div>
  </form>
</body>
</html>
