<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Bidbrain · Campaign Dashboards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e16; --panel:#101726; --border:rgba(255,255,255,.08);
    /* single accent — bright cornflower blue */
    --text:#e8ebf2; --muted:#8a93a6; --accent:#4C8DFF; --accent-2:#6EA8FF; --accent-bg:rgba(76,141,255,.12);
    --err:#f87171;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       color:var(--text);
       background:
         radial-gradient(860px 500px at 50% -6%, rgba(76,141,255,.22), transparent 62%),
         radial-gradient(1000px 560px at 50% -4%, rgba(110,168,255,.11), transparent 64%),
         radial-gradient(1100px 620px at 50% -8%,#152033 0%,#0b1120 52%,#070a11 100%);
       background-repeat:no-repeat;background-attachment:fixed}
  .card{width:100%;max-width:380px;padding:38px 34px;background:var(--panel);
        border:1px solid var(--border);border-radius:18px;position:relative;
        box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.02), 0 0 70px rgba(76,141,255,.08)}
  /* premium: a hairline cornflower-blue glow along the card's top edge */
  .card::before{content:"";position:absolute;left:24px;right:24px;top:-1px;height:1px;
        background:linear-gradient(90deg,transparent,rgba(110,168,255,.65),transparent);opacity:.75}
  .logo{display:block;height:30px;width:auto;margin:0 auto 22px}
  .logo svg{height:30px;width:auto}
  h1{font-size:19px;font-weight:700;margin:0 0 4px;text-align:center}
  p.sub{font-size:13px;color:var(--muted);margin:0 0 24px;text-align:center}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 7px;letter-spacing:.3px}
  input{width:100%;padding:13px 14px;font-size:15px;color:var(--text);background:#0b111d;
        border:1px solid #20293b;border-radius:11px;outline:none;font-family:inherit}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
  button{width:100%;margin-top:16px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;
         background:var(--accent);color:#06132b;border:none;border-radius:11px;letter-spacing:.2px;
         box-shadow:0 8px 24px rgba(76,141,255,.30);transition:background .15s,box-shadow .15s,transform .12s}
  button:hover{background:var(--accent-2);box-shadow:0 10px 30px rgba(76,141,255,.42)}
  button:active{transform:translateY(1px)}
  .err{margin-top:14px;font-size:13px;color:var(--err);min-height:16px;text-align:center}
  .foot{margin-top:20px;font-size:11.5px;color:#5b6478;text-align:center;line-height:1.5}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0 16px;color:#5b6478;font-size:12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .gwrap{display:flex;justify-content:center;min-height:44px}
</style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <div class="logo">{{ logo_svg | safe }}</div>
    <h1>Campaign Dashboards</h1>
    <p class="sub">Enter your agency or dashboard password.</p>
    <label for="pw">Password</label>
    <input id="pw" type="password" name="password" placeholder="••••••••" autofocus
           autocomplete="current-password">
    <input type="hidden" name="next" value="{{ next_url or '' }}">
    <button type="submit">Continue</button>
    {% if google_client_id %}
    <div class="divider"><span>or</span></div>
    <div id="g_id_onload" data-client_id="{{ google_client_id }}" data-callback="onGoogleCred" data-auto_prompt="false"></div>
    <div class="gwrap"><div class="g_id_signin" data-type="standard" data-theme="outline"
         data-text="signin_with" data-shape="pill" data-logo_alignment="left"></div></div>
    {% endif %}
    <div class="err">{{ error or "" }}</div>
    <div class="foot">An agency password opens every dashboard in that agency.<br>A single dashboard password opens just that dashboard.</div>
  </form>
  {% if google_client_id %}
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
  function onGoogleCred(resp){
    var err=document.querySelector('.err'); if(err) err.textContent='';
    fetch('/auth/google',{method:'POST',headers:{'content-type':'application/json'},
      credentials:'same-origin',body:JSON.stringify({credential:resp.credential})})
     .then(function(r){return r.json().catch(function(){return {ok:false,error:'Sign-in failed.'};});})
     .then(function(j){ if(j&&j.ok){ location.href=j.next||'/'; } else if(err){ err.textContent=(j&&j.error)||'Sign-in failed.'; } })
     .catch(function(){ if(err) err.textContent='Network error during sign-in.'; });
  }
  </script>
  {% endif %}
</body>
</html>
