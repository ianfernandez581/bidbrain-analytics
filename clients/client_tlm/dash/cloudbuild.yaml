# Cloud Build -> Cloud Run CD for the TLM dashboard web app (a SERVICE).
substitutions:
  _REGION: australia-southeast1
  _REPO: bidbrain
  _SERVICE: tlm-dash
  _RUNTIME_SA: tlm-dash-web@bidbrain-analytics.iam.gserviceaccount.com
  _BUCKET: bidbrain-analytics-tlm-dash
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: clients/client_tlm/dash
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA", "."]
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA"]
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --service-account=${_RUNTIME_SA}
      - --set-env-vars=GCS_BUCKET=${_BUCKET},DATA_OBJECT=tlm.json
      - --set-secrets=DASH_PASSWORD=tlm-dash-password:latest,SESSION_SECRET=tlm-dash-session-key:latest
      - --memory=512Mi
  - id: allow-public-under-org-policy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ["run", "services", "update", "${_SERVICE}", "--region=${_REGION}", "--no-invoker-iam-check"]
options:
  logging: CLOUD_LOGGING_ONLY