# Cloud Build -> Cloud Run CD for the Cloudflare export job (a JOB, not a service).
#
# Wire a Cloud Build trigger (one-time, mirrors client_mongodb README section 11):
#   repo:           Bidbrain/bidbrain-analytics
#   event:          push to ^main$
#   included files: clients/client_cloudflare/job/**     (only redeploy when this unit changes)
#   config:         clients/client_cloudflare/job/cloudbuild.yaml
#
# The trigger's service account needs: roles/run.admin, roles/artifactregistry.writer,
# and roles/iam.serviceAccountUser on _RUNTIME_SA.
# The daily run is a separate Cloud Scheduler trigger on the job.
substitutions:
  _REGION: australia-southeast1
  _REPO: bidbrain                                                   # Artifact Registry docker repo (shared with MongoDB)
  _JOB: cloudflare-export
  _RUNTIME_SA: cloudflare-dash-job@bidbrain-analytics.iam.gserviceaccount.com
  _BUCKET: bidbrain-analytics-cloudflare-dash
  _DATASET: client_cloudflare
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: clients/client_cloudflare/job
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA", "."]
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA"]
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    # `run jobs deploy` (NOT `run deploy`) creates-or-updates the Cloud Run Job.
    args:
      - run
      - jobs
      - deploy
      - ${_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA
      - --region=${_REGION}
      - --service-account=${_RUNTIME_SA}
      # BQ-only job now (no Snowflake): no SNOWFLAKE_KEY secret, no SF_* env vars. main.py
      # hardcodes project/dataset/bucket from CLIENT, so these env vars are informational.
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,BQ_DATASET=${_DATASET},GCS_BUCKET=${_BUCKET}
      - --memory=1Gi
options:
  logging: CLOUD_LOGGING_ONLY
