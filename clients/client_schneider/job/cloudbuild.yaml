# Cloud Build -> Cloud Run CD for the Schneider export job (a JOB, not a service).
#
# Wire a Cloud Build trigger (one-time, mirrors clients/client_STT/job):
#   repo:           Bidbrain/bidbrain-analytics
#   event:          push to ^main$
#   included files: clients/client_schneider/job/**     (only redeploy when this unit changes)
#   config:         clients/client_schneider/job/cloudbuild.yaml
#
# The trigger's service account needs: roles/run.admin, roles/artifactregistry.writer,
# and roles/iam.serviceAccountUser on _RUNTIME_SA.
# The daily run is a separate Cloud Scheduler trigger on the job.
substitutions:
  _REGION: australia-southeast1
  _REPO: bidbrain                                                   # Artifact Registry docker repo (shared)
  _JOB: schneider-export
  _RUNTIME_SA: schneider-dash-job@bidbrain-analytics.iam.gserviceaccount.com
  _BUCKET: bidbrain-analytics-schneider-dash
  _DATASET: client_schneider
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: clients/client_schneider/job
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA", "."]
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA"]
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    # `run jobs deploy` (NOT `run deploy`) creates-or-updates the Cloud Run Job.
    args:
      - run
      - jobs
      - deploy
      - ${_JOB}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_JOB}:$SHORT_SHA
      - --region=${_REGION}
      - --service-account=${_RUNTIME_SA}
      - --memory=1Gi
options:
  logging: CLOUD_LOGGING_ONLY
